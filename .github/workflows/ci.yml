# lake build とスモークテストを回す最小 CI
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: elan をインストール
        run: |
          curl -sSfL https://elan.lean-lang.org/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: ビルド
        run: lake build

      - name: スモークテスト
        run: lake env lean --run tests/Smoke.lean

      - name: HTTP テスト(ローカルサーバー相手)
        run: lake env lean --run tests/HttpTest.lean

      - name: Data / Py テスト(DuckDB ワーカー)
        run: |
          python3 -m pip install --quiet duckdb
          lake env lean --run tests/DataTest.lean

      - name: 契約の生成
        run: lake env lean --run examples/Contracts.lean examples/out

      - name: 生成した schema.yml を実物の dbt で検証
        run: |
          python3 -m pip install --quiet dbt-duckdb
          cp examples/out/schema.yml examples/dbt/models/schema.yml
          cd examples/dbt && python3 -m dbt.cli.main build --profiles-dir .

      - name: manifest を Lean に取り込んで検証(逆向き)
        run: lake env lean --run examples/DbtChecks.lean
